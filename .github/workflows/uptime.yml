name: Uptime CI
on:
  schedule:
    - cron: "*/5 * * * *"
  repository_dispatch:
    types:
      - uptime
  workflow_dispatch:
jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: upptime/uptime-monitor-action@v1
        with:
          command: "update"
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
