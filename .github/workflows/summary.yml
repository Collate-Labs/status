name: Summary CI
on:
  schedule:
    - cron: "0 0 * * *"
  repository_dispatch:
    types:
      - summary
  workflow_dispatch:
jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: upptime/uptime-monitor-action@v1
        with:
          command: "readme"
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
